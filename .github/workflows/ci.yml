name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: python -m compileall -q .
      - run: pytest tests -q -p no:cacheprovider --basetemp=output/pytest-ci
      - run: python evaluation/run_p0_evaluation.py

  container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t langgraph-agent:ci .
      - run: docker run -d --name agent-ci -p 8000:8000 -e AUTH_ENABLED=false langgraph-agent:ci
      - name: Wait for readiness
        run: |
          for i in $(seq 1 15); do
            if curl --fail --silent http://127.0.0.1:8000/health/ready; then exit 0; fi
            sleep 3
          done
          docker logs agent-ci
          exit 1
